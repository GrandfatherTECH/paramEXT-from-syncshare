<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - paramEXT</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Inter, "Segoe UI", Arial, sans-serif; background: #111827; color: #172033; padding: 18px; }
        .login-box { width: min(380px, 100%); background: #fff; border-radius: 8px; padding: 28px; box-shadow: 0 24px 60px rgba(0,0,0,0.25); }
        .mark { width: 38px; height: 38px; border-radius: 8px; background: #20b486; display: grid; place-items: center; font-weight: 900; color: #071b16; margin-bottom: 16px; }
        h1 { font-size: 22px; margin: 0 0 4px; }
        p { font-size: 13px; color: #667085; margin: 0 0 20px; }
        label { display: block; font-size: 13px; color: #344054; font-weight: 700; margin-bottom: 7px; }
        input { width: 100%; padding: 10px 11px; border: 1px solid #d0d5dd; border-radius: 8px; font-size: 14px; margin-bottom: 14px; }
        button { width: 100%; padding: 10px; border: 0; border-radius: 8px; background: #111827; color: #fff; font-size: 14px; font-weight: 800; cursor: pointer; }
        button:hover { background: #263244; }
        .error { color: #b42318; background: #fef3f2; border: 1px solid #fecdca; border-radius: 8px; font-size: 13px; padding: 9px 10px; margin-bottom: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="mark">p</div>
        <h1>Вход в paramEXT</h1>
        <p>Панель управления OpenEdu-бекендом.</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/admin/login">
            <label for="password">Пароль администратора</label>
            <input id="password" type="password" name="password" autocomplete="current-password" autofocus required>
            <button type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
